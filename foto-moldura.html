<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#283593">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="robots" content="noindex,nofollow">
<title>Movi Kids — Foto para redes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="mk-design.css?v=1.7.58">
</head>
<body class="mk-portal-page mk-frame-page" data-step="start">

<div class="mk-portal-deco" aria-hidden="true"></div>

<main class="mk-frame-wrap">
  <p class="mk-frame-sub" id="frame-subtitle">Sua foto na moldura Movi Kids</p>

  <div class="mk-frame-card" id="frame-card">
    <div class="mk-frame-deco" aria-hidden="true">
      <span class="mk-frame-sticker s1">⭐</span>
      <span class="mk-frame-sticker s2">✨</span>
      <span class="mk-frame-sticker s3">🚗</span>
      <span class="mk-frame-sticker s4">🧸</span>
      <span class="mk-frame-sticker s5">🌟</span>
      <span class="mk-frame-sticker s6">🎉</span>
      <span class="mk-frame-sticker s7">⭐</span>
      <span class="mk-frame-sticker s8">🛺</span>
    </div>
    <div class="mk-frame-top">
      <span class="mk-frame-top-title">Movi <span>Kids</span></span>
      <span class="mk-frame-top-ribbon">Diversão com segurança</span>
    </div>
    <div class="mk-frame-slot">
      <div class="mk-frame-placeholder" aria-hidden="true">📸</div>
      <video id="frame-video" playsinline muted autoplay></video>
      <img id="frame-result" alt="Sua foto na moldura Movi Kids">
    </div>
    <div class="mk-frame-bottom">
      <span class="mk-frame-bottom-pill">📸 @movikidsslz</span>
      <span class="mk-frame-bottom-loc">Golden Shopping Calhau</span>
    </div>
  </div>

  <p class="mk-frame-err" id="frame-err" role="status" aria-live="polite"></p>

  <div class="mk-frame-toolbar mk-frame-toolbar--start">
    <button type="button" class="mk-portal-btn" id="btn-camera">📸 Tirar foto</button>
    <label class="mk-frame-link">ou escolher da galeria<input type="file" id="file-pick" accept="image/*" hidden></label>
  </div>

  <div class="mk-frame-toolbar mk-frame-toolbar--live">
    <button type="button" class="mk-portal-btn" id="btn-snap">Capturar</button>
    <button type="button" class="mk-frame-flip" id="btn-flip">🔄 Trocar câmera</button>
  </div>

  <div class="mk-frame-toolbar mk-frame-toolbar--done">
    <button type="button" class="mk-portal-btn mk-frame-share" id="btn-share">Compartilhar no Instagram</button>
    <div class="mk-frame-mini-row">
      <button type="button" class="mk-frame-link" id="btn-download">Baixar</button>
      <button type="button" class="mk-frame-link" id="btn-retry">Nova foto</button>
    </div>
  </div>

  <p class="mk-frame-hint">Legenda sugerida: <em>@movikidsslz</em> #MoviKids</p>
  <a class="mk-frame-back" href="acompanhar.html" id="link-voltar">← Voltar ao cronômetro</a>
</main>

<canvas id="frame-canvas" width="1080" height="1350" hidden aria-hidden="true"></canvas>

<script>
const IG_PROFILE = 'https://www.instagram.com/movikidsslz';
const IG_CAPTION = 'Diversão na @movikidsslz 🚗✨ #MoviKids #GoldenShoppingCalhau';
const OUT_W = 1080;
const OUT_H = 1350;
const PHOTO = { x: 130, y: 250, w: 820, h: 820 };

let stream_ = null;
let facing_ = 'environment';
let lastBlob_ = null;

const video = document.getElementById('frame-video');
const resultImg = document.getElementById('frame-result');
const canvas = document.getElementById('frame-canvas');
const ctx = canvas.getContext('2d');

function setStep(step) {
  document.body.dataset.step = step;
}

function setErr(msg) {
  document.getElementById('frame-err').textContent = msg || '';
}

function roundRect_(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

function drawConfetti_(ctx) {
  const dots = [
    [70, 320, '#FFD54F', 14], [55, 520, '#4fc3f7', 10], [88, 720, '#ec407a', 12],
    [1000, 380, '#66bb6a', 11], [1010, 580, '#FFD54F', 13], [985, 780, '#ab47bc', 10],
    [200, 1120, '#4fc3f7', 9], [880, 1100, '#ff8a65', 11], [540, 1280, '#FFD54F', 8]
  ];
  dots.forEach(([x, y, c, r]) => {
    ctx.fillStyle = c;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  const stickers = [
    [95, 215, '⭐', 44], [990, 340, '🚗', 40], [78, 650, '🧸', 38],
    [1005, 720, '✨', 36], [120, 1080, '🌟', 34], [960, 1050, '🎉', 40]
  ];
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  stickers.forEach(([x, y, ch, sz]) => {
    ctx.font = sz + 'px sans-serif';
    ctx.fillText(ch, x, y);
  });
}

function drawMoldura_(nome) {
  const g = ctx.createLinearGradient(0, 0, 0, OUT_H);
  g.addColorStop(0, '#1a237e');
  g.addColorStop(0.45, '#5c6bc0');
  g.addColorStop(1, '#1565c0');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, OUT_W, 250);
  ctx.fillRect(0, 1070, OUT_W, 280);
  ctx.fillRect(0, 250, 130, 820);
  ctx.fillRect(950, 250, 130, 820);
  drawConfetti_(ctx);
  ctx.strokeStyle = '#ec407a';
  ctx.lineWidth = 14;
  roundRect_(ctx, 114, 234, 852, 852, 38);
  ctx.stroke();
  ctx.strokeStyle = '#FFD54F';
  ctx.lineWidth = 8;
  roundRect_(ctx, 122, 242, 836, 836, 34);
  ctx.stroke();
  ctx.font = 'bold 72px Fredoka One, Arial Rounded MT Bold, sans-serif';
  const partM = 'Movi ';
  const partK = 'Kids';
  const titleW = ctx.measureText(partM).width + ctx.measureText(partK).width;
  let tx = (OUT_W - titleW) / 2;
  ctx.textAlign = 'left';
  ctx.fillStyle = '#fff';
  ctx.fillText(partM, tx, 100);
  ctx.fillStyle = '#FFD54F';
  ctx.fillText(partK, tx + ctx.measureText(partM).width, 100);
  ctx.textAlign = 'center';
  ctx.font = 'bold 48px sans-serif';
  ctx.fillText('✨', tx - 50, 98);
  ctx.fillText('✨', tx + titleW + 20, 98);
  const rw = 420;
  const rh = 44;
  const rx = (OUT_W - rw) / 2;
  const ry = 128;
  ctx.fillStyle = 'rgba(236, 64, 122, 0.92)';
  roundRect_(ctx, rx, ry, rw, rh, 22);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px Nunito, sans-serif';
  ctx.fillText('Diversão com segurança', OUT_W / 2, ry + 30);
  const pw = 340;
  const ph = 48;
  const px = (OUT_W - pw) / 2;
  const py = 1118;
  ctx.fillStyle = 'rgba(41, 182, 246, 0.95)';
  roundRect_(ctx, px, py, pw, ph, 24);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px Nunito, sans-serif';
  ctx.fillText('📸 @movikidsslz', OUT_W / 2, py + 32);
  ctx.fillStyle = '#90caf9';
  ctx.font = 'bold 22px Nunito, sans-serif';
  ctx.fillText('Golden Shopping Calhau', OUT_W / 2, 1210);
  if (nome) {
    ctx.font = 'bold 34px Nunito, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.96)';
    ctx.shadowColor = 'rgba(0,0,0,0.45)';
    ctx.shadowBlur = 6;
    ctx.fillText(String(nome).trim().slice(0, 28), OUT_W / 2, PHOTO.y + PHOTO.h - 44);
    ctx.shadowBlur = 0;
  }
}

function drawPhotoCover_(source) {
  const sw = source.videoWidth || source.naturalWidth || source.width;
  const sh = source.videoHeight || source.naturalHeight || source.height;
  if (!sw || !sh) return;
  const { x, y, w, h } = PHOTO;
  const scale = Math.max(w / sw, h / sh);
  const cw = sw * scale;
  const ch = sh * scale;
  const cx = x + (w - cw) / 2;
  const cy = y + (h - ch) / 2;
  ctx.save();
  roundRect_(ctx, x, y, w, h, 28);
  ctx.clip();
  if (source === video && facing_ === 'user') {
    ctx.translate(x + w, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(source, x + (w - cw) / 2, cy, cw, ch);
  } else {
    ctx.drawImage(source, cx, cy, cw, ch);
  }
  ctx.restore();
}

async function composite_(source) {
  ctx.fillStyle = '#263238';
  ctx.fillRect(PHOTO.x, PHOTO.y, PHOTO.w, PHOTO.h);
  drawPhotoCover_(source);
  const nome = new URLSearchParams(location.search).get('nome');
  drawMoldura_(nome);
  return new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
}

function stopCamera_() {
  if (stream_) {
    stream_.getTracks().forEach(t => t.stop());
    stream_ = null;
  }
  video.srcObject = null;
}

async function startCamera_() {
  setErr('');
  stopCamera_();
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setErr('Use o celular ou escolha da galeria.');
    return;
  }
  try {
    stream_ = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing_, width: { ideal: 1280 }, height: { ideal: 1280 } },
      audio: false
    });
    video.srcObject = stream_;
    video.dataset.facing = facing_;
    await video.play();
    setStep('live');
  } catch (e) {
    setErr('Permita a câmera ou escolha da galeria.');
  }
}

async function useFile_(file) {
  if (!file) return;
  setErr('');
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = async () => {
    try {
      lastBlob_ = await composite_(img);
      resultImg.src = URL.createObjectURL(lastBlob_);
      setStep('done');
    } catch (e) {
      setErr('Erro ao montar a foto.');
    }
    URL.revokeObjectURL(url);
  };
  img.onerror = () => setErr('Imagem inválida.');
  img.src = url;
}

async function snap_() {
  if (!video.videoWidth) return;
  try {
    lastBlob_ = await composite_(video);
    resultImg.src = URL.createObjectURL(lastBlob_);
    stopCamera_();
    setStep('done');
  } catch (e) {
    setErr('Erro ao capturar.');
  }
}

function download_() {
  if (!lastBlob_) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(lastBlob_);
  a.download = 'movikids-foto.jpg';
  a.click();
}

async function share_() {
  if (!lastBlob_) return;
  setErr('');
  const file = new File([lastBlob_], 'movikids-foto.jpg', { type: 'image/jpeg' });
  try { await navigator.clipboard.writeText(IG_CAPTION); } catch (e) {}
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'Movi Kids', text: IG_CAPTION });
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }
  download_();
  setErr('Foto salva. Abra o Instagram e marque @movikidsslz');
  setTimeout(() => window.open(IG_PROFILE, '_blank', 'noopener'), 500);
}

function retry_() {
  lastBlob_ = null;
  resultImg.removeAttribute('src');
  setStep('start');
  setErr('');
}

document.getElementById('btn-camera').addEventListener('click', startCamera_);
document.getElementById('btn-flip').addEventListener('click', () => {
  facing_ = facing_ === 'environment' ? 'user' : 'environment';
  startCamera_();
});
document.getElementById('btn-snap').addEventListener('click', snap_);
document.getElementById('file-pick').addEventListener('change', e => useFile_(e.target.files[0]));
document.getElementById('btn-share').addEventListener('click', share_);
document.getElementById('btn-download').addEventListener('click', download_);
document.getElementById('btn-retry').addEventListener('click', retry_);

(function init_() {
  const nome = new URLSearchParams(location.search).get('nome');
  if (nome) {
    document.getElementById('frame-subtitle').textContent = 'Foto de ' + nome;
  }
  const tel = new URLSearchParams(location.search).get('tel') || new URLSearchParams(location.search).get('telefone');
  if (tel) {
    document.getElementById('link-voltar').href =
      'acompanhar.html?tel=' + encodeURIComponent(String(tel).replace(/\D/g, ''));
  }
})();
</script>
</body>
</html>
