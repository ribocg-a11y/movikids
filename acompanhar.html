<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1565C0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Movi Kids">
<meta name="robots" content="noindex,nofollow">
<title>Movi Kids — Acompanhar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="mk-design.css?v=1.7.47">
</head>
<body class="mk-portal-page" data-view="gate">

<div class="mk-portal-glow" aria-hidden="true"></div>

<!-- Entrada: só telefone -->
<section class="mk-portal-gate" id="sec-gate">
  <div class="mk-portal-brand-lg">Movi <span>Kids</span></div>
  <p class="mk-portal-gate-title">Quanto tempo falta? ⏱️</p>
  <div class="mk-portal-gate-form">
    <input id="telefone" class="mk-portal-input" type="tel" inputmode="tel" autocomplete="tel"
      placeholder="Seu telefone com DDD" maxlength="16" aria-label="Telefone com DDD">
    <button type="button" class="mk-portal-btn" id="btn">Ver tempo</button>
  </div>
  <p class="mk-portal-gate-err" id="status" role="status" aria-live="polite"></p>
</section>

<!-- Timer: uma ou mais locações, só o relógio -->
<main class="mk-portal-stage" id="resultado" hidden aria-live="polite"></main>

<button type="button" class="mk-portal-back" id="btn-voltar" hidden>Trocar telefone</button>

<script>
const PORTAL_FALLBACK_GAS = 'https://script.google.com/macros/s/AKfycbwakQ-_aWsF5lFGLsiwB5UvJ4AlpW88krSv8daPeMvULwX5FOIdMhGVgdGd0G35270Y/exec';
const RING_C = 2 * Math.PI * 88;
let GAS_URL = PORTAL_FALLBACK_GAS;
let locacoes = [];
let _telAtual = '';
let _refreshTimer = null;
let _carouselIdx = 0;
let _touchStartX = null;

function esc(v) {
  return String(v == null ? '' : v).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}
function digits(v) { return String(v || '').replace(/\D/g, ''); }
function fmt(sec) {
  sec = Math.max(0, Math.floor(sec || 0));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}
function maskTelInput(raw) {
  const d = digits(raw).slice(0, 11);
  if (d.length <= 2) return d.length ? '(' + d : '';
  if (d.length <= 7) return '(' + d.slice(0, 2) + ') ' + d.slice(2);
  return '(' + d.slice(0, 2) + ') ' + d.slice(2, 7) + '-' + d.slice(7);
}
function tipoIcon(tipo) {
  if (String(tipo).indexOf('Triciclo') >= 0) return '🛺';
  if (String(tipo).indexOf('Pel') >= 0) return '🧸';
  return '🚗';
}
const PLAN_LABELS = { '10min': '10 min', '20min': '20 min', '30min': '30 min', '40min': '40 min', '60min': '1 hora', '3h': '3 horas' };
function planoLabel_(plano) {
  return PLAN_LABELS[plano] || String(plano || '').replace('min', ' min');
}
function infoBasicaHtml_(l) {
  const plano = planoLabel_(l.plano);
  const ext = Number(l.extendedMins || 0);
  const planoTxt = ext > 0 ? plano + ' +' + ext + ' min' : plano;
  const veic = esc(l.veiculo || l.tipo || '—');
  const st = esc(l.status || '—');
  return `<div class="mk-portal-info">
    <div class="mk-portal-info-row"><span>Plano</span><strong>${planoTxt}</strong></div>
    <div class="mk-portal-info-row"><span>Veículo</span><strong>${veic}</strong></div>
    <div class="mk-portal-info-row"><span>Status</span><strong>${st}</strong></div>
  </div>`;
}
function brincandoLabel_(n) {
  return n === 1 ? '1 brincando' : n + ' brincando';
}
function sortLocacoes_(list) {
  return list.slice().sort((a, b) => String(a.crianca || '').localeCompare(String(b.crianca || ''), 'pt-BR'));
}
function locStats_(l) {
  const rem = restante(l);
  const totalSec = totalMins(l) * 60;
  const extra = rem < 0;
  const pend = l.status === 'Pendente';
  const warn = !extra && !pend && rem > 0 && rem <= 300;
  const ringClass = extra ? 'extra' : (pend ? 'wait' : (warn ? 'warn' : 'ok'));
  const timeTxt = extra ? '+' + fmt(Math.abs(rem)) : fmt(rem);
  const dash = ringDash_(extra ? 0 : Math.max(0, rem), totalSec, extra);
  const lbl = extra ? 'Tempo extra' : (pend ? 'Já já começa' : (warn ? 'Quase lá!' : 'Falta'));
  const cardCls = 'mk-portal-play' + (extra ? ' is-extra' : '') + (warn ? ' is-warn' : '') + (pend ? ' is-wait' : '');
  return { rem, totalSec, extra, pend, warn, ringClass, timeTxt, dash, lbl, cardCls };
}
function ringBlockHtml_(stats) {
  return `<div class="mk-portal-play-ring">
    <svg viewBox="0 0 200 200" aria-hidden="true">
      <circle class="mk-portal-ring-bg" cx="100" cy="100" r="88"></circle>
      <circle class="mk-portal-ring-prog ${stats.ringClass}" cx="100" cy="100" r="88"
        style="stroke-dasharray:${stats.dash.vis.toFixed(1)} ${stats.dash.circ.toFixed(1)};stroke-dashoffset:0"></circle>
    </svg>
    <div class="mk-portal-ring-center">
      <span class="mk-portal-ring-lbl">${stats.lbl}</span>
      <b class="mk-portal-ring-time">${stats.timeTxt}</b>
    </div>
  </div>`;
}
function alertasHtml_() {
  const itens = locacoes.map((l) => {
    const s = locStats_(l);
    if (!s.warn && !s.extra) return null;
    const nome = esc(l.crianca);
    if (s.extra) return { cls: 'is-extra', txt: nome + ' — hora de buscar no balcão!' };
    return { cls: '', txt: nome + ' em ' + fmt(s.rem) + ' — atenção!' };
  }).filter(Boolean);
  if (!itens.length) return '';
  return itens.map((a) => `<div class="mk-portal-alert ${a.cls}">${a.txt}</div>`).join('');
}
function clampCarouselIdx_() {
  if (!locacoes.length) {
    _carouselIdx = 0;
    return;
  }
  if (_carouselIdx < 0) _carouselIdx = 0;
  if (_carouselIdx >= locacoes.length) _carouselIdx = locacoes.length - 1;
}
function setCarouselIdx_(i) {
  if (!locacoes.length) return;
  _carouselIdx = ((i % locacoes.length) + locacoes.length) % locacoes.length;
  render();
}
/** MK_TIMER_CANON_GUARD I16 — espelha mergeSessaoCanonica + calcStartTimestamp (index.html). Ver MAPA_ERROS_FALHAS_BUGS.md */
function calcStartTimestamp_(data, horaInicio) {
  if (!data || !horaInicio) return 0;
  const dp = String(data).split('/');
  const hp = String(horaInicio).split(':');
  if (dp.length < 3 || hp.length < 2) return 0;
  const d = new Date(
    parseInt(dp[2], 10),
    parseInt(dp[1], 10) - 1,
    parseInt(dp[0], 10),
    parseInt(hp[0], 10),
    parseInt(hp[1], 10),
    0
  );
  const out = d.getTime();
  return isNaN(out) ? 0 : out;
}
function canonLoc_(l) {
  const status = String(l.status || '').trim();
  let startTimestamp = Number(l.startTimestamp || 0);
  const nowTs = Date.now();
  if (status === 'Pendente') {
    startTimestamp = 0;
  } else if (status === 'Ativa' && ((!startTimestamp || startTimestamp < 1e12) || startTimestamp > nowTs + 300000)) {
    startTimestamp = calcStartTimestamp_(l.data, l.horaInicio);
  }
  const extendedMins = Number(l.extendedMins || 0);
  const originalMins = l.originalMins != null ? Number(l.originalMins) : Math.max(0, Number(l.mins || 0) - extendedMins);
  const totalMins = l.originalMins != null ? originalMins + extendedMins : Number(l.mins || 0);
  return Object.assign({}, l, { status, startTimestamp, mins: totalMins, originalMins, extendedMins });
}
function totalMins(l) {
  return canonLoc_(l).mins;
}
function restante(l) {
  const c = canonLoc_(l);
  if (c.status === 'Pendente') return c.mins * 60;
  if (!c.startTimestamp || c.startTimestamp < 1e12 || c.startTimestamp > Date.now() + 300000) {
    return c.mins * 60;
  }
  const elapsed = (Date.now() - c.startTimestamp) / 1000;
  return Math.floor(c.mins * 60 - elapsed);
}
/** Arco visível no sentido horário a partir do topo (12h). */
function ringDash_(rem, totalSec, extra) {
  if (extra || totalSec <= 0) return { vis: 0, circ: RING_C };
  const p = Math.max(0, Math.min(1, rem / totalSec));
  return { vis: RING_C * p, circ: RING_C };
}
function portalErro_(d, err) {
  if (d && Number(d.code) === 429) return 'Aguarde 1 minuto e tente de novo.';
  if (d && d.erro) return String(d.erro);
  if (err && err.message) return err.message;
  return 'Sem conexão. Tente outra vez.';
}
function setStatus(msg) {
  const el = document.getElementById('status');
  if (el) el.textContent = msg || '';
}

function setView(mode) {
  document.body.dataset.view = mode;
  const gate = document.getElementById('sec-gate');
  const stage = document.getElementById('resultado');
  const back = document.getElementById('btn-voltar');
  if (gate) gate.hidden = mode === 'play';
  if (stage) stage.hidden = mode !== 'play';
  if (back) back.hidden = mode !== 'play';
}

async function loadGasUrl_() {
  try {
    const base = location.pathname.replace(/[^/]*$/, '');
    const r = await fetch(base + 'gas-endpoint.json?_=' + Date.now(), { cache: 'no-store' });
    const j = await r.json();
    if (j && j.url) GAS_URL = j.url;
  } catch (e) {}
}

function render() {
  const box = document.getElementById('resultado');
  if (!box) return;

  if (!locacoes.length) {
    setView('gate');
    setStatus('Nenhuma brincadeira ativa agora. Confira o telefone ou fale com o operador.');
    box.innerHTML = '';
    return;
  }

  setView('play');
  setStatus('');
  clampCarouselIdx_();

  const n = locacoes.length;
  const atual = locacoes[_carouselIdx];
  const stats = locStats_(atual);
  const telFmt = maskTelInput(_telAtual);

  const tabs = locacoes.map((l, i) =>
    `<button type="button" class="mk-portal-tab${i === _carouselIdx ? ' is-active' : ''}" data-carousel-tab="${i}" role="tab" aria-selected="${i === _carouselIdx}">${esc(l.crianca)}</button>`
  ).join('');

  const dots = n > 1 ? locacoes.map((_, i) =>
    `<button type="button" class="mk-portal-dot${i === _carouselIdx ? ' is-active' : ''}" data-carousel-tab="${i}" aria-label="Criança ${i + 1}"></button>`
  ).join('') : '';

  const outros = locacoes
    .map((l, i) => ({ l, i, s: locStats_(l) }))
    .filter((x) => x.i !== _carouselIdx)
    .map((x) => {
      const pillCls = 'mk-portal-other-pill' + (x.s.extra ? ' is-extra' : (x.s.warn ? ' is-warn' : ''));
      return `<button type="button" class="mk-portal-other-row" data-carousel-other="${x.i}">
        <span class="mk-portal-other-name">${tipoIcon(x.l.tipo)} ${esc(x.l.crianca)}</span>
        <span class="${pillCls}">${x.s.timeTxt}</span>
      </button>`;
    }).join('');

  const nav = n > 1 ? `<div class="mk-portal-nav">
    <button type="button" class="mk-portal-nav-btn" id="btn-carousel-prev">Anterior</button>
    <button type="button" class="mk-portal-nav-btn" id="btn-carousel-next">Próxima</button>
  </div>` : '';

  const othersSec = n > 1 ? `<section class="mk-portal-others">
    <p class="mk-portal-others-title">Outras no mesmo telefone</p>
    ${outros}
  </section>` : '';

  box.innerHTML = `<div class="mk-portal-carousel">
    <div class="mk-portal-brand-lg mk-portal-brand-play">Movi <span>Kids</span></div>
    <p class="mk-portal-subtitle">${esc(telFmt)} · ${brincandoLabel_(n)}</p>
    <div class="mk-portal-tabs" role="tablist">${tabs}</div>
    <p class="mk-portal-counter">Criança ${_carouselIdx + 1} de ${n}</p>
    ${alertasHtml_()}
    <article class="${stats.cardCls}">
      <div class="mk-portal-play-name">${tipoIcon(atual.tipo)} ${esc(atual.crianca)}</div>
      ${ringBlockHtml_(stats)}
      ${infoBasicaHtml_(atual)}
      ${stats.extra ? '<p class="mk-portal-play-msg">Hora de buscar no balcão 🏃</p>' : ''}
      ${stats.pend ? '<p class="mk-portal-play-msg">Preparando o veículo…</p>' : ''}
    </article>
    ${nav}
    ${dots ? `<div class="mk-portal-dots">${dots}</div>` : ''}
    ${othersSec}
  </div>`;
}

async function buscar(silent) {
  const tel = digits(document.getElementById('telefone').value);
  if (tel.length < 10) {
    setStatus('Digite o telefone com DDD.');
    return;
  }
  if (!silent) setStatus('Buscando…');
  const btn = document.getElementById('btn');
  if (btn) btn.disabled = true;
  try {
    const url = GAS_URL + '?action=buscarPortalResponsavel&telefone=' + encodeURIComponent(tel) + '&t=' + Date.now();
    const r = await fetch(url, { cache: 'no-store' });
    const d = await r.json();
    if (!d.ok) {
      const ex = new Error(d.erro || 'Falha');
      ex.data = d;
      throw ex;
    }
    locacoes = sortLocacoes_(d.locacoes || []);
    _telAtual = tel;
    _carouselIdx = 0;
    render();
    if (locacoes.length) iniciarAutoRefresh(tel);
    else clearInterval(_refreshTimer);
  } catch (e) {
    if (!silent) setStatus(portalErro_(e.data, e));
  } finally {
    if (btn) btn.disabled = false;
  }
}

function voltarGate_() {
  locacoes = [];
  _telAtual = '';
  _carouselIdx = 0;
  clearInterval(_refreshTimer);
  setView('gate');
  setStatus('');
  document.getElementById('resultado').innerHTML = '';
}

function iniciarAutoRefresh(tel) {
  _telAtual = tel;
  clearInterval(_refreshTimer);
  _refreshTimer = setInterval(async () => {
    if (!_telAtual) return;
    try {
      const url = GAS_URL + '?action=buscarPortalResponsavel&telefone=' + encodeURIComponent(_telAtual) + '&t=' + Date.now();
      const r = await fetch(url, { cache: 'no-store' });
      const d = await r.json();
      if (!d.ok) return;
      const sorted = sortLocacoes_(d.locacoes || []);
      const prevId = locacoes[_carouselIdx] && (locacoes[_carouselIdx].id || locacoes[_carouselIdx].rowIndex);
      locacoes = sorted;
      if (prevId != null) {
        const ni = sorted.findIndex((l) => (l.id || l.rowIndex) === prevId);
        if (ni >= 0) _carouselIdx = ni;
      }
      clampCarouselIdx_();
      render();
    } catch (e) {}
  }, 15000);
}

function applyDeepLink_() {
  const p = new URLSearchParams(location.search);
  const tel = digits(p.get('tel') || p.get('telefone') || '');
  if (!tel) return;
  const inp = document.getElementById('telefone');
  if (inp) {
    inp.value = maskTelInput(tel);
    if (tel.length >= 10) setTimeout(() => buscar(false), 400);
  }
}

document.getElementById('btn').addEventListener('click', () => buscar(false));
document.getElementById('btn-voltar').addEventListener('click', voltarGate_);

document.getElementById('resultado').addEventListener('click', (e) => {
  const tab = e.target.closest('[data-carousel-tab]');
  if (tab) {
    setCarouselIdx_(Number(tab.getAttribute('data-carousel-tab')));
    return;
  }
  const other = e.target.closest('[data-carousel-other]');
  if (other) {
    setCarouselIdx_(Number(other.getAttribute('data-carousel-other')));
    return;
  }
  if (e.target.id === 'btn-carousel-prev') setCarouselIdx_(_carouselIdx - 1);
  if (e.target.id === 'btn-carousel-next') setCarouselIdx_(_carouselIdx + 1);
});

const stageEl = document.getElementById('resultado');
stageEl.addEventListener('touchstart', (e) => {
  if (locacoes.length <= 1) return;
  _touchStartX = e.changedTouches[0].clientX;
}, { passive: true });
stageEl.addEventListener('touchend', (e) => {
  if (_touchStartX == null || locacoes.length <= 1) return;
  const dx = e.changedTouches[0].clientX - _touchStartX;
  _touchStartX = null;
  if (Math.abs(dx) < 48) return;
  if (dx < 0) setCarouselIdx_(_carouselIdx + 1);
  else setCarouselIdx_(_carouselIdx - 1);
}, { passive: true });
document.getElementById('telefone').addEventListener('input', (e) => {
  e.target.value = maskTelInput(e.target.value);
});
document.getElementById('telefone').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') buscar(false);
});

setInterval(() => { if (locacoes.length) render(); }, 1000);

loadGasUrl_().then(() => applyDeepLink_());
</script>
</body>
</html>
