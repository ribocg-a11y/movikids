<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#283593">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="robots" content="noindex,nofollow">
<title>Movi Kids — Foto para redes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="mk-design.css?v=1.7.56">
</head>
<body class="mk-portal-page mk-frame-page" data-step="start">

<div class="mk-portal-deco" aria-hidden="true"></div>

<main class="mk-frame-wrap">
  <div class="mk-portal-brand-lg mk-portal-brand-play">Movi <span>Kids</span></div>
  <p class="mk-frame-sub" id="frame-subtitle">Monte sua foto na moldura e compartilhe</p>

  <div class="mk-frame-stage" id="frame-stage">
    <div class="mk-frame-preview" id="frame-live">
      <video id="frame-video" playsinline muted autoplay hidden></video>
      <img id="frame-result" alt="Sua foto na moldura Movi Kids" hidden>
      <img class="mk-frame-overlay" src="assets/moldura-retrato.svg" alt="" aria-hidden="true">
      <div class="mk-frame-placeholder" id="frame-placeholder">
        <span>📸</span>
        <p>Toque em <strong>Abrir câmera</strong><br>a foto entra certinha na moldura</p>
      </div>
    </div>
  </div>

  <p class="mk-frame-err" id="frame-err" role="status" aria-live="polite"></p>

  <div class="mk-frame-actions" id="actions-camera">
    <button type="button" class="mk-portal-btn" id="btn-camera">Abrir câmera</button>
    <label class="mk-frame-file-btn">
      Escolher da galeria
      <input type="file" id="file-pick" accept="image/*" capture="environment" hidden>
    </label>
  </div>

  <div class="mk-frame-actions" id="actions-capture" hidden>
    <button type="button" class="mk-portal-btn" id="btn-snap">📸 Capturar</button>
    <button type="button" class="mk-frame-sec" id="btn-flip">Trocar câmera</button>
  </div>

  <div class="mk-frame-actions" id="actions-share" hidden>
    <button type="button" class="mk-portal-btn mk-frame-share" id="btn-share">Compartilhar no Instagram</button>
    <button type="button" class="mk-frame-sec" id="btn-download">Baixar foto</button>
    <button type="button" class="mk-frame-sec" id="btn-retry">Nova foto</button>
  </div>

  <p class="mk-frame-hint" id="frame-hint">
    No celular, <strong>Compartilhar</strong> abre o Instagram com a foto pronta.
    Legenda sugerida: <em>@movikidsslz</em> #MoviKids
  </p>

  <a class="mk-frame-back" href="acompanhar.html" id="link-voltar">← Voltar ao cronômetro</a>
</main>

<canvas id="frame-canvas" width="1080" height="1350" hidden aria-hidden="true"></canvas>

<script>
const IG_USER = 'movikidsslz';
const IG_PROFILE = 'https://www.instagram.com/movikidsslz';
const IG_CAPTION = 'Diversão na @movikidsslz 🚗✨ #MoviKids #GoldenShoppingCalhau';
const OUT_W = 1080;
const OUT_H = 1350;
const PHOTO = { x: 130, y: 250, w: 820, h: 820 };

let stream_ = null;
let facing_ = 'environment';
let molduraImg_ = null;
let lastBlob_ = null;

const video = document.getElementById('frame-video');
const resultImg = document.getElementById('frame-result');
const placeholder = document.getElementById('frame-placeholder');
const canvas = document.getElementById('frame-canvas');
const ctx = canvas.getContext('2d');

function setStep(step) {
  document.body.dataset.step = step;
  document.getElementById('actions-camera').hidden = step !== 'start';
  document.getElementById('actions-capture').hidden = step !== 'live';
  document.getElementById('actions-share').hidden = step !== 'done';
  placeholder.hidden = step === 'live' || step === 'done';
  video.hidden = step !== 'live';
  resultImg.hidden = step !== 'done';
}

function setErr(msg) {
  document.getElementById('frame-err').textContent = msg || '';
}

function loadMoldura_() {
  return new Promise((resolve, reject) => {
    if (molduraImg_ && molduraImg_.complete) return resolve(molduraImg_);
    const img = new Image();
    img.onload = () => { molduraImg_ = img; resolve(img); };
    img.onerror = reject;
    img.src = 'assets/moldura-retrato.svg';
  });
}

function drawPhotoCover_(source, dx, dy, dw, dh) {
  const sw = source.videoWidth || source.naturalWidth || source.width;
  const sh = source.videoHeight || source.naturalHeight || source.height;
  if (!sw || !sh) return;
  const scale = Math.max(dw / sw, dh / sh);
  const cw = sw * scale;
  const ch = sh * scale;
  const cx = dx + (dw - cw) / 2;
  const cy = dy + (dh - ch) / 2;
  ctx.drawImage(source, cx, cy, cw, ch);
}

async function composite_(source) {
  await loadMoldura_();
  ctx.fillStyle = '#1a237e';
  ctx.fillRect(0, 0, OUT_W, OUT_H);
  drawPhotoCover_(source, PHOTO.x, PHOTO.y, PHOTO.w, PHOTO.h);
  ctx.drawImage(molduraImg_, 0, 0, OUT_W, OUT_H);
  const nome = new URLSearchParams(location.search).get('nome');
  if (nome) {
    ctx.font = 'bold 36px Nunito, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.textAlign = 'center';
    ctx.fillText(String(nome).trim().slice(0, 32), OUT_W / 2, PHOTO.y + PHOTO.h - 36);
  }
  return new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
}

function stopCamera_() {
  if (stream_) {
    stream_.getTracks().forEach(t => t.stop());
    stream_ = null;
  }
  video.srcObject = null;
}

async function startCamera_() {
  setErr('');
  stopCamera_();
  try {
    stream_ = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing_, width: { ideal: 1280 }, height: { ideal: 1280 } },
      audio: false
    });
    video.srcObject = stream_;
    video.dataset.facing = facing_;
    await video.play();
    setStep('live');
  } catch (e) {
    setErr('Não foi possível abrir a câmera. Use “Escolher da galeria” ou permita o acesso.');
  }
}

async function useFile_(file) {
  if (!file) return;
  setErr('');
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = async () => {
    try {
      lastBlob_ = await composite_(img);
      resultImg.src = URL.createObjectURL(lastBlob_);
      setStep('done');
    } catch (e) {
      setErr('Erro ao montar a moldura.');
    }
    URL.revokeObjectURL(url);
  };
  img.onerror = () => setErr('Imagem inválida.');
  img.src = url;
}

async function snap_() {
  if (!video.videoWidth) return;
  try {
    lastBlob_ = await composite_(video);
    resultImg.src = URL.createObjectURL(lastBlob_);
    stopCamera_();
    setStep('done');
  } catch (e) {
    setErr('Erro ao capturar. Tente de novo.');
  }
}

function download_() {
  if (!lastBlob_) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(lastBlob_);
  a.download = 'movikids-foto.jpg';
  a.click();
}

async function copyCaption_() {
  try {
    await navigator.clipboard.writeText(IG_CAPTION);
    return true;
  } catch (e) {
    return false;
  }
}

async function share_() {
  if (!lastBlob_) return;
  setErr('');
  const file = new File([lastBlob_], 'movikids-foto.jpg', { type: 'image/jpeg' });
  const copied = await copyCaption_();

  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        files: [file],
        title: 'Movi Kids',
        text: IG_CAPTION
      });
      setErr(copied ? 'Legenda copiada! Cole no Instagram se precisar.' : 'Escolha Instagram no menu.');
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }

  download_();
  if (copied) {
    setErr('Foto baixada e legenda copiada. Abra o Instagram e publique marcando @movikidsslz');
  } else {
    setErr('Foto baixada. Abra o Instagram e marque @movikidsslz na legenda.');
  }
  setTimeout(() => {
    window.open(IG_PROFILE, '_blank', 'noopener');
  }, 600);
}

function retry_() {
  lastBlob_ = null;
  resultImg.removeAttribute('src');
  setStep('start');
  setErr('');
}

document.getElementById('btn-camera').addEventListener('click', startCamera_);
document.getElementById('btn-flip').addEventListener('click', () => {
  facing_ = facing_ === 'environment' ? 'user' : 'environment';
  startCamera_();
});
document.getElementById('btn-snap').addEventListener('click', snap_);
document.getElementById('file-pick').addEventListener('change', e => useFile_(e.target.files[0]));
document.getElementById('btn-share').addEventListener('click', share_);
document.getElementById('btn-download').addEventListener('click', download_);
document.getElementById('btn-retry').addEventListener('click', retry_);

(function init_() {
  const nome = new URLSearchParams(location.search).get('nome');
  if (nome) {
    document.getElementById('frame-subtitle').textContent = 'Foto de ' + nome + ' na moldura Movi Kids';
  }
  const tel = new URLSearchParams(location.search).get('tel') || new URLSearchParams(location.search).get('telefone');
  if (tel) {
    const a = document.getElementById('link-voltar');
    a.href = 'acompanhar.html?tel=' + encodeURIComponent(tel.replace(/\D/g, ''));
  }
  loadMoldura_().catch(() => setErr('Moldura não carregou. Atualize a página.'));
})();
</script>
</body>
</html>
