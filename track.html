<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1565C0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Movi Kids — Acompanhar Locação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1565C0;--pink:#C2185B;--green:#2E7D32;
  --amber:#E65100;--red:#B71C1C;
  font-family:'Nunito',sans-serif;
  -webkit-font-smoothing:antialiased;
}
html,body{height:100%;overflow:hidden}

body{
  min-height:100vh;
  background:linear-gradient(145deg,#060d1f 0%,#0d2a5c 25%,#1565C0 45%,#3a1070 65%,#880E4F 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;
}

/* Orbs de fundo */
.orb{position:fixed;border-radius:50%;filter:blur(70px);opacity:.3;pointer-events:none;z-index:0}
.orb1{width:400px;height:400px;top:-100px;left:-100px;background:#1565C0}
.orb2{width:400px;height:400px;bottom:-100px;right:-100px;background:#C2185B}

.card{
  position:relative;z-index:1;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.15);
  border-radius:32px;
  padding:32px 28px 36px;
  width:100%;max-width:380px;
  text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.12);
  animation:fadeUp .6s ease-out;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Header */
.brand{font-family:'Fredoka One',cursive;font-size:18px;color:#fff;letter-spacing:1px;margin-bottom:24px;opacity:.8}
.brand span{color:#FFD54F}

.tipo-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  border-radius:99px;padding:6px 16px;margin-bottom:20px;
  font-size:13px;font-weight:700;color:rgba(255,255,255,.9);
}

.crianca-nome{
  font-size:32px;font-weight:900;color:#fff;
  line-height:1.1;margin-bottom:4px;
  text-shadow:0 2px 20px rgba(0,0,0,.3);
}
.resp-nome{font-size:14px;color:rgba(255,255,255,.55);font-weight:600;margin-bottom:28px}

/* Ring timer */
.ring-wrap{position:relative;width:180px;height:180px;margin:0 auto 24px}
.ring-wrap svg{transform:rotate(-90deg);width:180px;height:180px}
.ring-bg{fill:none;stroke:rgba(255,255,255,.12);stroke-width:10}
.ring-prog{
  fill:none;stroke-width:10;stroke-linecap:round;
  stroke-dasharray:502;stroke-dashoffset:0;
  transition:stroke-dashoffset 1s linear,stroke .4s;
}
.ring-center{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.ring-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.55);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.ring-time{font-size:38px;font-weight:900;color:#fff;font-variant-numeric:tabular-nums;line-height:1}
.ring-extra{font-size:12px;font-weight:700;color:#FF8A65;margin-top:4px}

.plan-info{
  background:rgba(255,255,255,.08);border-radius:12px;
  padding:12px 20px;font-size:13px;color:rgba(255,255,255,.7);font-weight:600;
  margin-bottom:8px;
}

.status-bar{
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:12px;color:rgba(255,255,255,.4);margin-top:16px;
}
.status-dot{width:6px;height:6px;border-radius:50%;background:#69F0AE;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Estado encerrada ── */
.ended-card{text-align:center}
.ended-icon{font-size:64px;margin-bottom:16px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.ended-title{font-size:26px;font-weight:900;color:#fff;margin-bottom:8px}
.ended-sub{font-size:14px;color:rgba(255,255,255,.6);line-height:1.6}
.ended-time{font-size:14px;font-weight:700;color:rgba(255,255,255,.8);margin-top:12px}

/* ── Estado carregando ── */
.loading{color:rgba(255,255,255,.6);font-size:14px;text-align:center}
.spinner{width:28px;height:28px;border:2.5px solid rgba(255,255,255,.2);
  border-top-color:rgba(255,255,255,.8);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Estado não encontrado ── */
.not-found{color:rgba(255,255,255,.7);text-align:center}
.not-found h2{font-size:22px;font-weight:900;color:#fff;margin-bottom:8px}
.not-found p{font-size:14px;line-height:1.6}

/* Footer */
.footer{
  position:relative;z-index:1;
  margin-top:20px;font-size:11px;color:rgba(255,255,255,.25);
  text-align:center;font-weight:600;letter-spacing:.03em;
}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card" id="card">
  <div class="loading">
    <div class="spinner"></div>
    Verificando locação...
  </div>
</div>

<div class="footer">🚗 Movi Kids · Golden Shopping Calhau</div>

<script>
const WEBAPP = 'https://script.google.com/macros/s/AKfycbzcAfu7c3ESVE4sQT_CA5XL3W1bqDZESZX3nTSAWH0Wzqedm2JTVPJwSfYwEOrxkgnw/exec';

// ── Parse URL params ─────────────────────────────────────────
const P = Object.fromEntries(new URLSearchParams(location.search));
const rowIndex  = parseInt(P.r || '0');
const startTs   = parseInt(P.ts || '0');
const mins      = parseInt(P.m  || '0');
const tipo      = decodeURIComponent(P.v  || 'Carro');
const crianca   = decodeURIComponent(P.c  || '');
const responsavel = decodeURIComponent(P.p || '');

const CIRCUM    = 502; // 2πr, r=80
const tipoIcon  = tipo === 'Pelúcia' ? '🧸' : '🚗';
const tipoColor = tipo === 'Pelúcia' ? '#C2185B' : '#42A5F5';

let timerInterval = null;
let pollInterval  = null;
let ended         = false;
let confirmedEnd  = false;

// ── Helpers ──────────────────────────────────────────────────
function fmtTime(sec) {
  const a = Math.abs(sec);
  const h = Math.floor(a / 3600);
  const m = Math.floor((a % 3600) / 60);
  const s = a % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function remaining() {
  if (!startTs) return mins * 60;
  const elapsed = Math.floor((Date.now() - startTs) / 1000);
  return (mins * 60) - elapsed;
}

// ── Render timer card ────────────────────────────────────────
function renderTimer() {
  const rem     = remaining();
  const total   = mins * 60;
  const isOver  = rem <= 0;
  const isWarn  = rem <= 300 && !isOver;
  const progress = isOver ? 0 : Math.max(0, rem / total);
  const offset  = CIRCUM * (1 - progress);
  const color   = isOver ? '#FF5252' : isWarn ? '#FF9800' : tipoColor;
  const label   = isOver ? 'TEMPO EXTRA' : 'RESTANTE';
  const extra   = isOver
    ? `<div class="ring-extra">+${Math.floor(Math.abs(rem) / 60)}min de tempo extra</div>` : '';

  const horaInicio = startTs
    ? new Date(startTs).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})
    : '--:--';

  document.getElementById('card').innerHTML = `
    <div class="brand">🚗 Movi <span>Kids</span></div>
    <div class="tipo-badge">${tipoIcon} ${tipo}</div>
    <div class="crianca-nome">${crianca || 'Criança'}</div>
    <div class="resp-nome">👤 Responsável: ${responsavel || '—'}</div>
    <div class="ring-wrap">
      <svg viewBox="0 0 180 180">
        <circle class="ring-bg" cx="90" cy="90" r="80"/>
        <circle class="ring-prog" cx="90" cy="90" r="80"
          stroke="${color}"
          stroke-dashoffset="${offset.toFixed(1)}"
          stroke-dasharray="${CIRCUM}"/>
      </svg>
      <div class="ring-center">
        <div class="ring-label">${label}</div>
        <div class="ring-time" style="color:${color}">${fmtTime(Math.abs(rem))}</div>
        ${extra}
      </div>
    </div>
    <div class="plan-info">Plano ${mins}min · Início: ${horaInicio}</div>
    <div class="status-bar">
      <div class="status-dot"></div>
      Locação ativa · atualiza automaticamente
    </div>`;
}

// ── Render encerrada ─────────────────────────────────────────
function renderEnded(minUsados) {
  ended = true;
  if (timerInterval) clearInterval(timerInterval);
  if (pollInterval)  clearInterval(pollInterval);
  const durLabel = minUsados ? `Duração total: ${minUsados} min` : '';
  document.getElementById('card').innerHTML = `
    <div class="ended-card">
      <div class="brand">🚗 Movi <span>Kids</span></div>
      <div class="ended-icon">🏁</div>
      <div class="ended-title">Locação Encerrada</div>
      <div class="ended-sub">
        A locação de <strong style="color:#fff">${crianca || 'sua criança'}</strong>
        foi encerrada com sucesso.<br><br>
        Obrigado por escolher a <strong style="color:#FFD54F">Movi Kids</strong>! 🌟
      </div>
      ${durLabel ? `<div class="ended-time">${durLabel}</div>` : ''}
    </div>`;
}

// ── Render inválido ──────────────────────────────────────────
function renderInvalid() {
  document.getElementById('card').innerHTML = `
    <div class="not-found">
      <div class="brand">🚗 Movi <span>Kids</span></div>
      <h2>Link inválido</h2>
      <p>Este link de acompanhamento não é válido ou a locação já foi encerrada.</p>
    </div>`;
}

// ── Verificar status no servidor ─────────────────────────────
async function verificarServidor() {
  if (ended) return;
  try {
    const res = await fetch(`${WEBAPP}?action=verificarSessao&rowIndex=${rowIndex}`);
    const d   = await res.json();
    if (!d.ok) return;
    if (d.status === 'Encerrada') {
      renderEnded(d.minUsados);
    }
  } catch {}
}

// ── Iniciar ──────────────────────────────────────────────────
function init() {
  if (!rowIndex || !startTs || !mins) { renderInvalid(); return; }

  // Renderiza imediatamente
  renderTimer();

  // Timer a cada segundo
  timerInterval = setInterval(() => {
    if (!ended) renderTimer();
  }, 1000);

  // Poll servidor a cada 30s
  verificarServidor();
  pollInterval = setInterval(verificarServidor, 30000);

  // Se o tempo local acabar, aumenta frequência de polling
  setTimeout(() => {
    if (!ended) {
      clearInterval(pollInterval);
      pollInterval = setInterval(verificarServidor, 10000);
    }
  }, Math.max(0, (mins * 60 * 1000) - (Date.now() - startTs)));
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
