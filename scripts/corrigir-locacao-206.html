<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Corrigir locação 206 — tempo extra indevido</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; }
    button { font-size: 16px; padding: 12px 20px; width: 100%; cursor: pointer; margin-top: 12px; }
    pre { background: #f4f4f4; padding: 12px; font-size: 12px; overflow: auto; }
    .ok { color: #0a7; } .err { color: #c00; }
  </style>
</head>
<body>
  <h1>Corrigir locação 206 (Michele / Daniel)</h1>
  <p>Zera tempo extra e ajusta total para <strong>R$ 12</strong> (plano 10 min).</p>
  <p><strong>Requer GAS v1.5.36</strong> implantado (Apps Script → Nova versão).</p>
  <p>Sem deploy: edite manualmente a <strong>linha 206</strong> na aba LOCACOES (ver INCIDENTE_AUTH_OPERADORES_2026-06-04.md).</p>
  <button type="button" id="btn">Corrigir agora (API)</button>
  <p id="status"></p>
  <pre id="log"></pre>
  <script>
    const GAS = 'https://script.google.com/macros/s/AKfycbzcAfu7c3ESVE4sQT_CA5XL3W1bqDZESZX3nTSAWH0Wzqedm2JTVPJwSfYwEOrxkgnw/exec';
    document.getElementById('btn').onclick = async () => {
      const st = document.getElementById('status');
      const log = document.getElementById('log');
      st.textContent = 'Enviando...';
      log.textContent = '';
      const q = new URLSearchParams({
        action: 'corrigirFinanceiroLocacaoAdmin',
        adminPin: '1416',
        rowIndex: '206',
        zerarExtra: 'true',
        motivo: 'Tempo extra indevido por falha login operador 04/06/2026 — correcao administrativa'
      });
      try {
        const r = await fetch(GAS + '?' + q);
        const d = await r.json();
        log.textContent = JSON.stringify(d, null, 2);
        if (d.ok && d.locacao && Number(d.locacao.valorTotal) === 12) {
          st.textContent = 'Corrigido. Recarregue Caixa do dia no app.';
          st.className = 'ok';
        } else if (d.erro && d.erro.indexOf('desconhecida') >= 0) {
          st.textContent = 'Implante GAS v1.5.36 primeiro ou corrija a planilha manualmente.';
          st.className = 'err';
        } else {
          st.textContent = d.erro || 'Verifique o log';
          st.className = 'err';
        }
      } catch (e) {
        st.textContent = e.message;
        st.className = 'err';
      }
    };
  </script>
</body>
</html>
