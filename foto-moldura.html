<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#283593">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="robots" content="noindex,nofollow">
<title>Movi Kids — Foto para redes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="mk-design.css?v=1.7.60">
</head>
<body class="mk-portal-page mk-frame-page" data-step="start">

<div class="mk-portal-deco" aria-hidden="true"></div>

<main class="mk-frame-wrap">
  <p class="mk-frame-sub" id="frame-subtitle">Sua foto na moldura Movi Kids</p>

  <div class="mk-frame-switch" id="frame-switch" hidden></div>

  <div class="mk-frame-card" id="frame-card">
    <div class="mk-frame-corners" aria-hidden="true">
      <span class="mk-frame-corner tl"></span>
      <span class="mk-frame-corner tr"></span>
      <span class="mk-frame-corner bl"></span>
      <span class="mk-frame-corner br"></span>
    </div>
    <div class="mk-frame-stickers" aria-hidden="true">
      <span class="st s1">⭐</span>
      <span class="st s2">🚗</span>
      <span class="st s3">✨</span>
      <span class="st s4">🛺</span>
      <span class="st s5">🧸</span>
      <span class="st s6">🌟</span>
      <span class="st s7">🎉</span>
      <span class="st s8">⭐</span>
    </div>
    <header class="mk-frame-head">
      <h2 class="mk-frame-brand">Movi <span>Kids</span></h2>
      <p class="mk-frame-name" id="frame-nome">⭐</p>
    </header>
    <div class="mk-frame-slot">
      <div class="mk-frame-placeholder" aria-hidden="true">📸</div>
      <video id="frame-video" playsinline muted autoplay></video>
      <img id="frame-result" alt="Sua foto na moldura Movi Kids">
    </div>
    <footer class="mk-frame-foot">
      <span class="mk-frame-pill">📸 @movikidsslz</span>
      <span class="mk-frame-loc">Golden Shopping Calhau</span>
    </footer>
  </div>

  <p class="mk-frame-err" id="frame-err" role="status" aria-live="polite"></p>

  <div class="mk-frame-toolbar mk-frame-toolbar--start">
    <button type="button" class="mk-portal-btn" id="btn-camera">📸 Tirar foto</button>
    <label class="mk-frame-link">ou escolher da galeria<input type="file" id="file-pick" accept="image/*" hidden></label>
  </div>

  <div class="mk-frame-toolbar mk-frame-toolbar--live">
    <button type="button" class="mk-portal-btn" id="btn-snap">Capturar</button>
    <button type="button" class="mk-frame-flip" id="btn-flip">🔄 Trocar câmera</button>
  </div>

  <div class="mk-frame-toolbar mk-frame-toolbar--done">
    <button type="button" class="mk-portal-btn" id="btn-share">Compartilhar no Instagram</button>
    <div class="mk-frame-mini-row">
      <button type="button" class="mk-frame-link" id="btn-download">Baixar</button>
      <button type="button" class="mk-frame-link" id="btn-retry">Nova foto</button>
    </div>
  </div>

  <p class="mk-frame-hint">Legenda sugerida: <em id="frame-caption-hint">@movikidsslz</em> #MoviKids</p>
  <a class="mk-frame-back" href="acompanhar.html" id="link-voltar">← Voltar ao cronômetro</a>
</main>

<canvas id="frame-canvas" width="1080" height="1350" hidden aria-hidden="true"></canvas>

<script>
const PORTAL_FALLBACK_GAS = 'https://script.google.com/macros/s/AKfycbwakQ-_aWsF5lFGLsiwB5UvJ4AlpW88krSv8daPeMvULwX5FOIdMhGVgdGd0G35270Y/exec';
const IG_PROFILE = 'https://www.instagram.com/movikidsslz';
const OUT_W = 1080;
const OUT_H = 1350;
const PHOTO = { x: 130, y: 250, w: 820, h: 820 };

let GAS_URL = PORTAL_FALLBACK_GAS;
let stream_ = null;
let facing_ = 'environment';
let lastBlob_ = null;
let lastSource_ = null;
let criancas_ = [];
let kidIdx_ = 0;

const video = document.getElementById('frame-video');
const resultImg = document.getElementById('frame-result');
const canvas = document.getElementById('frame-canvas');
const ctx = canvas.getContext('2d');

function esc(v) {
  return String(v == null ? '' : v).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}
function digits(v) { return String(v || '').replace(/\D/g, ''); }
function nomeAtual_() { return criancas_[kidIdx_] || ''; }
function igCaption_() {
  const n = nomeAtual_();
  return n
    ? `${n} se divertiu na @movikidsslz 🚗✨ #MoviKids #GoldenShoppingCalhau`
    : 'Diversão na @movikidsslz 🚗✨ #MoviKids #GoldenShoppingCalhau';
}

function setStep(step) { document.body.dataset.step = step; }
function setErr(msg) { document.getElementById('frame-err').textContent = msg || ''; }

function updateNomeUI_() {
  const nome = nomeAtual_();
  const nomeEl = document.getElementById('frame-nome');
  if (nomeEl) nomeEl.textContent = nome || '⭐';
  document.getElementById('frame-subtitle').textContent = nome ? 'Foto de ' + nome : 'Sua foto na moldura Movi Kids';
  document.getElementById('frame-caption-hint').textContent = igCaption_();
}

function renderSwitcher_() {
  const el = document.getElementById('frame-switch');
  if (!el) return;
  if (criancas_.length <= 1) {
    el.hidden = true;
    el.innerHTML = '';
    return;
  }
  el.hidden = false;
  el.innerHTML = criancas_.map((n, i) =>
    `<button type="button" class="mk-frame-kid-pill${i === kidIdx_ ? ' is-active' : ''}" data-kid="${i}">${esc(n)}</button>`
  ).join('');
}

function setKidIdx_(i) {
  if (!criancas_.length) return;
  kidIdx_ = Math.max(0, Math.min(criancas_.length - 1, i));
  updateNomeUI_();
  renderSwitcher_();
  if (lastSource_ && document.body.dataset.step === 'done') refreshComposite_();
}

function roundRect_(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

function mkBlueGrad_(c, x0, y0, x1, y1) {
  const g = c.createLinearGradient(x0, y0, x1, y1);
  g.addColorStop(0, '#1a237e');
  g.addColorStop(0.5, '#3949ab');
  g.addColorStop(1, '#1565c0');
  return g;
}

function drawConfetti_(c) {
  const dots = [
    [70, 120, '#FFD54F', 12], [1010, 180, '#4fc3f7', 10], [55, 400, '#FFD54F', 9],
    [1025, 520, '#81d4fa', 11], [90, 900, '#ffb300', 10], [990, 950, '#FFD54F', 13],
    [45, 1180, '#4fc3f7', 8], [1035, 1220, '#FFD54F', 9], [540, 1280, '#4fc3f7', 7]
  ];
  dots.forEach(([x, y, col, r]) => {
    c.globalAlpha = 0.9;
    c.fillStyle = col;
    c.beginPath();
    c.arc(x, y, r, 0, Math.PI * 2);
    c.fill();
  });
  c.globalAlpha = 1;
}

function drawSticker_(c, x, y, ch, sz, rot) {
  c.save();
  c.translate(x, y);
  c.rotate(rot || 0);
  c.font = sz + 'px sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText(ch, 0, 0);
  c.restore();
}

function drawCornerBracket_(c, x, y, flipX, flipY) {
  c.save();
  c.translate(x, y);
  c.scale(flipX ? -1 : 1, flipY ? -1 : 1);
  c.strokeStyle = '#FFD54F';
  c.lineWidth = 8;
  c.lineCap = 'round';
  c.beginPath();
  c.moveTo(0, 36);
  c.lineTo(0, 0);
  c.lineTo(36, 0);
  c.stroke();
  c.restore();
}

function drawMoldura_(nome) {
  const bg = mkBlueGrad_(ctx, 0, 0, 0, OUT_H);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, OUT_W, 250);
  ctx.fillRect(0, 1070, OUT_W, 280);
  ctx.fillRect(0, 250, 130, 820);
  ctx.fillRect(950, 250, 130, 820);

  drawConfetti_(ctx);
  const stickers = [
    [88, 200, '⭐', 40, -0.3], [995, 320, '🚗', 38, 0.25],
    [72, 620, '🧸', 36, 0.15], [1008, 720, '✨', 34, -0.2],
    [110, 1040, '🌟', 32, 0.35], [970, 1080, '🛺', 36, -0.15],
    [85, 420, '🎉', 30, 0.1], [1015, 880, '⭐', 28, -0.25]
  ];
  stickers.forEach(([x, y, ch, sz, rot]) => drawSticker_(ctx, x, y, ch, sz, rot));

  drawCornerBracket_(ctx, PHOTO.x - 18, PHOTO.y - 18, false, false);
  drawCornerBracket_(ctx, PHOTO.x + PHOTO.w + 18, PHOTO.y - 18, true, false);
  drawCornerBracket_(ctx, PHOTO.x - 18, PHOTO.y + PHOTO.h + 18, false, true);
  drawCornerBracket_(ctx, PHOTO.x + PHOTO.w + 18, PHOTO.y + PHOTO.h + 18, true, true);

  ctx.font = 'bold 72px Fredoka One, Arial Rounded MT Bold, sans-serif';
  const partM = 'Movi ';
  const partK = 'Kids';
  const titleW = ctx.measureText(partM).width + ctx.measureText(partK).width;
  let tx = (OUT_W - titleW) / 2;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#fff';
  ctx.fillText(partM, tx, 100);
  ctx.fillStyle = '#FFD54F';
  ctx.fillText(partK, tx + ctx.measureText(partM).width, 100);
  ctx.font = 'bold 44px sans-serif';
  ctx.fillText('✨', tx - 48, 98);
  ctx.fillText('✨', tx + titleW + 12, 98);

  const nomeTxt = String(nome || '').trim() || '⭐';
  ctx.font = 'bold 30px Nunito, sans-serif';
  const nw = Math.min(640, Math.max(220, ctx.measureText(nomeTxt).width + 72));
  const nx = (OUT_W - nw) / 2;
  const ny = 128;
  const ng = ctx.createLinearGradient(nx, ny, nx + nw, ny + 48);
  ng.addColorStop(0, '#FFD54F');
  ng.addColorStop(1, '#ffb300');
  ctx.fillStyle = ng;
  roundRect_(ctx, nx, ny, nw, 48, 24);
  ctx.fill();
  ctx.fillStyle = '#1a237e';
  ctx.textAlign = 'center';
  ctx.fillText(nomeTxt.slice(0, 26), OUT_W / 2, ny + 33);

  ctx.fillStyle = '#37474f';
  roundRect_(ctx, PHOTO.x, PHOTO.y, PHOTO.w, PHOTO.h, 28);
  ctx.fill();

  const gg = ctx.createLinearGradient(PHOTO.x, PHOTO.y, PHOTO.x + PHOTO.w, PHOTO.y);
  gg.addColorStop(0, '#FFD54F');
  gg.addColorStop(0.5, '#ffb300');
  gg.addColorStop(1, '#FFD54F');
  ctx.strokeStyle = gg;
  ctx.lineWidth = 12;
  roundRect_(ctx, PHOTO.x - 6, PHOTO.y - 6, PHOTO.w + 12, PHOTO.h + 12, 34);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(79, 195, 247, 0.65)';
  ctx.lineWidth = 4;
  roundRect_(ctx, PHOTO.x - 14, PHOTO.y - 14, PHOTO.w + 28, PHOTO.h + 28, 38);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(115, 1185, 16, 0, Math.PI * 2);
  ctx.fillStyle = '#FFD54F';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(965, 1185, 16, 0, Math.PI * 2);
  ctx.fillStyle = '#4fc3f7';
  ctx.fill();

  const pw = 380;
  const px = (OUT_W - pw) / 2;
  const py = 1110;
  ctx.fillStyle = 'rgba(41, 182, 246, 0.95)';
  roundRect_(ctx, px, py, pw, 50, 25);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px Nunito, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('📸 @movikidsslz', OUT_W / 2, py + 34);
  ctx.fillStyle = '#90caf9';
  ctx.font = 'bold 22px Nunito, sans-serif';
  ctx.fillText('Golden Shopping Calhau', OUT_W / 2, 1210);
}

function drawPhotoCover_(source) {
  const sw = source.videoWidth || source.naturalWidth || source.width;
  const sh = source.videoHeight || source.naturalHeight || source.height;
  if (!sw || !sh) return;
  const { x, y, w, h } = PHOTO;
  const scale = Math.max(w / sw, h / sh);
  const cw = sw * scale;
  const ch = sh * scale;
  const cx = x + (w - cw) / 2;
  const cy = y + (h - ch) / 2;
  ctx.save();
  roundRect_(ctx, x, y, w, h, 28);
  ctx.clip();
  if (source === video && facing_ === 'user') {
    ctx.translate(x + w, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(source, x + (w - cw) / 2, cy, cw, ch);
  } else {
    ctx.drawImage(source, cx, cy, cw, ch);
  }
  ctx.restore();
}

async function composite_(source) {
  drawMoldura_(nomeAtual_());
  drawPhotoCover_(source);
  return new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
}

async function refreshComposite_() {
  if (!lastSource_) return;
  try {
    lastBlob_ = await composite_(lastSource_);
    resultImg.src = URL.createObjectURL(lastBlob_);
  } catch (e) {}
}

function stopCamera_() {
  if (stream_) {
    stream_.getTracks().forEach(t => t.stop());
    stream_ = null;
  }
  video.srcObject = null;
}

async function startCamera_() {
  setErr('');
  stopCamera_();
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setErr('Use o celular ou escolha da galeria.');
    return;
  }
  try {
    stream_ = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing_, width: { ideal: 1280 }, height: { ideal: 1280 } },
      audio: false
    });
    video.srcObject = stream_;
    video.dataset.facing = facing_;
    await video.play();
    setStep('live');
  } catch (e) {
    setErr('Permita a câmera ou escolha da galeria.');
  }
}

async function useFile_(file) {
  if (!file) return;
  setErr('');
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = async () => {
    try {
      lastSource_ = img;
      lastBlob_ = await composite_(img);
      resultImg.src = URL.createObjectURL(lastBlob_);
      setStep('done');
    } catch (e) {
      setErr('Erro ao montar a foto.');
    }
    URL.revokeObjectURL(url);
  };
  img.onerror = () => setErr('Imagem inválida.');
  img.src = url;
}

async function snap_() {
  if (!video.videoWidth) return;
  try {
    lastSource_ = video;
    lastBlob_ = await composite_(video);
    resultImg.src = URL.createObjectURL(lastBlob_);
    stopCamera_();
    setStep('done');
  } catch (e) {
    setErr('Erro ao capturar.');
  }
}

function download_() {
  if (!lastBlob_) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(lastBlob_);
  a.download = 'movikids-foto.jpg';
  a.click();
}

async function share_() {
  if (!lastBlob_) return;
  setErr('');
  const cap = igCaption_();
  const file = new File([lastBlob_], 'movikids-foto.jpg', { type: 'image/jpeg' });
  try { await navigator.clipboard.writeText(cap); } catch (e) {}
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'Movi Kids', text: cap });
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }
  download_();
  setErr('Foto salva. Abra o Instagram e marque @movikidsslz');
  setTimeout(() => window.open(IG_PROFILE, '_blank', 'noopener'), 500);
}

function retry_() {
  lastBlob_ = null;
  lastSource_ = null;
  resultImg.removeAttribute('src');
  setStep('start');
  setErr('');
}

async function loadGasUrl_() {
  try {
    const base = location.pathname.replace(/[^/]*$/, '');
    const r = await fetch(base + 'gas-endpoint.json?_=' + Date.now(), { cache: 'no-store' });
    const j = await r.json();
    if (j && j.url) GAS_URL = j.url;
  } catch (e) {}
}

async function loadCriancas_(tel) {
  if (!tel || tel.length < 10) return;
  try {
    const url = GAS_URL + '?action=buscarPortalResponsavel&telefone=' + encodeURIComponent(tel) + '&t=' + Date.now();
    const r = await fetch(url, { cache: 'no-store' });
    const d = await r.json();
    if (!d.ok || !d.locacoes || !d.locacoes.length) return;
    const seen = new Set();
    criancas_ = [];
    d.locacoes.forEach(l => {
      const n = String(l.crianca || '').trim();
      if (n && !seen.has(n.toLowerCase())) {
        seen.add(n.toLowerCase());
        criancas_.push(n);
      }
    });
  } catch (e) {}
}

document.getElementById('btn-camera').addEventListener('click', startCamera_);
document.getElementById('btn-flip').addEventListener('click', () => {
  facing_ = facing_ === 'environment' ? 'user' : 'environment';
  startCamera_();
});
document.getElementById('btn-snap').addEventListener('click', snap_);
document.getElementById('file-pick').addEventListener('change', e => useFile_(e.target.files[0]));
document.getElementById('btn-share').addEventListener('click', share_);
document.getElementById('btn-download').addEventListener('click', download_);
document.getElementById('btn-retry').addEventListener('click', retry_);

document.getElementById('frame-switch').addEventListener('click', e => {
  const btn = e.target.closest('[data-kid]');
  if (btn) setKidIdx_(Number(btn.getAttribute('data-kid')));
});

(async function init_() {
  const p = new URLSearchParams(location.search);
  const tel = digits(p.get('tel') || p.get('telefone') || '');
  const nomeUrl = (p.get('nome') || '').trim();

  if (tel) {
    document.getElementById('link-voltar').href = 'acompanhar.html?tel=' + encodeURIComponent(tel);
  }

  await loadGasUrl_();
  if (tel) await loadCriancas_(tel);
  if (!criancas_.length && nomeUrl) criancas_ = [nomeUrl];
  if (nomeUrl && criancas_.length) {
    const ni = criancas_.findIndex(n => n.toLowerCase() === nomeUrl.toLowerCase());
    kidIdx_ = ni >= 0 ? ni : 0;
  }

  updateNomeUI_();
  renderSwitcher_();
})();
</script>
</body>
</html>
