<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movi Kids — Mock idle 1h</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 24px auto; padding: 0 16px; line-height: 1.45; }
    h1 { font-size: 1.25rem; }
    button { font-size: 16px; padding: 14px 18px; margin: 12px 0; width: 100%; cursor: pointer; border-radius: 8px; border: none; background: #2563eb; color: #fff; }
    .warn { background: #fef3c7; border: 1px solid #f59e0b; padding: 12px; border-radius: 8px; font-size: 14px; }
    .ok { color: #0a7; } .err { color: #c00; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Mock idle 1h — homologação I21</h1>
  <div class="warn">
    Use no <strong>tablet do balcão</strong>, com operador logado e <strong>zero</strong> locações Ativas/Pendentes.
    Deve abrir pelo link HTTPS (mesmo site do app) — arquivo local não funciona.
  </div>
  <ol>
    <li>Login operador no app <code>?force=1.7.96</code></li>
    <li>Abra esta página no Chrome do tablet</li>
    <li>Toque no botão abaixo</li>
  </ol>
  <button type="button" id="btn">Simular 61 min sem atividade + voltar ao app</button>
  <p id="status"></p>
  <script>
    const APP = 'https://ribocg-a11y.github.io/movikids/?force=1.7.96';
    document.getElementById('btn').onclick = () => {
      const st = document.getElementById('status');
      try {
        const ts = String(Date.now() - 61 * 60 * 1000);
        localStorage.setItem('mk_auth_last_activity', ts);
        st.textContent = 'Salvo — voltando ao app...';
        st.className = 'ok';
        setTimeout(() => { location.href = APP; }, 600);
      } catch (e) {
        st.textContent = 'Erro: ' + e.message;
        st.className = 'err';
      }
    };
  </script>
</body>
</html>
