<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#dc2743">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="robots" content="noindex,nofollow">
<title>Movi Kids — Foto para redes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="mk-design.css?v=1.7.59">
</head>
<body class="mk-portal-page mk-frame-page" data-step="start">

<div class="mk-frame-bg" aria-hidden="true"></div>

<main class="mk-frame-wrap">
  <p class="mk-frame-sub" id="frame-subtitle">Sua foto na moldura Movi Kids</p>

  <div class="mk-frame-switch" id="frame-switch" hidden></div>

  <div class="mk-frame-card mk-frame-card--ig" id="frame-card">
    <div class="mk-frame-ig-head">
      <span class="mk-frame-ig-avatar" aria-hidden="true">MK</span>
      <span class="mk-frame-ig-user">movikidsslz</span>
      <span class="mk-frame-ig-dots" aria-hidden="true">⋯</span>
    </div>
    <div class="mk-frame-name-bar" id="frame-nome">⭐</div>
    <div class="mk-frame-slot-wrap">
      <div class="mk-frame-hearts" aria-hidden="true">
        <span class="mk-frame-heart h1">❤️</span>
        <span class="mk-frame-heart h2">💗</span>
        <span class="mk-frame-heart h3">❤️</span>
        <span class="mk-frame-heart h4">💖</span>
        <span class="mk-frame-heart h5">❤️</span>
        <span class="mk-frame-heart h6">💕</span>
        <span class="mk-frame-heart h7">❤️</span>
        <span class="mk-frame-heart h8">💗</span>
      </div>
      <div class="mk-frame-slot">
        <div class="mk-frame-placeholder" aria-hidden="true">📸</div>
        <video id="frame-video" playsinline muted autoplay></video>
        <img id="frame-result" alt="Sua foto na moldura Movi Kids">
      </div>
    </div>
    <div class="mk-frame-ig-actions" aria-hidden="true">
      <span class="mk-frame-ig-act">♡</span>
      <span class="mk-frame-ig-act">💬</span>
      <span class="mk-frame-ig-act">↗</span>
      <span class="mk-frame-ig-save">🔖</span>
    </div>
    <div class="mk-frame-ig-caption">
      <strong>movikidsslz</strong> Diversão no Golden Shopping Calhau 🚗✨
      <span class="mk-frame-ig-tag">#MoviKids</span>
    </div>
  </div>

  <p class="mk-frame-err" id="frame-err" role="status" aria-live="polite"></p>

  <div class="mk-frame-toolbar mk-frame-toolbar--start">
    <button type="button" class="mk-portal-btn" id="btn-camera">📸 Tirar foto</button>
    <label class="mk-frame-link">ou escolher da galeria<input type="file" id="file-pick" accept="image/*" hidden></label>
  </div>

  <div class="mk-frame-toolbar mk-frame-toolbar--live">
    <button type="button" class="mk-portal-btn" id="btn-snap">Capturar</button>
    <button type="button" class="mk-frame-flip" id="btn-flip">🔄 Trocar câmera</button>
  </div>

  <div class="mk-frame-toolbar mk-frame-toolbar--done">
    <button type="button" class="mk-portal-btn mk-frame-share" id="btn-share">Compartilhar no Instagram</button>
    <div class="mk-frame-mini-row">
      <button type="button" class="mk-frame-link" id="btn-download">Baixar</button>
      <button type="button" class="mk-frame-link" id="btn-retry">Nova foto</button>
    </div>
  </div>

  <p class="mk-frame-hint">Legenda sugerida: <em id="frame-caption-hint">@movikidsslz</em> #MoviKids</p>
  <a class="mk-frame-back" href="acompanhar.html" id="link-voltar">← Voltar ao cronômetro</a>
</main>

<canvas id="frame-canvas" width="1080" height="1350" hidden aria-hidden="true"></canvas>

<script>
const PORTAL_FALLBACK_GAS = 'https://script.google.com/macros/s/AKfycbwakQ-_aWsF5lFGLsiwB5UvJ4AlpW88krSv8daPeMvULwX5FOIdMhGVgdGd0G35270Y/exec';
const IG_PROFILE = 'https://www.instagram.com/movikidsslz';
const OUT_W = 1080;
const OUT_H = 1350;
const CARD = { x: 70, y: 100, w: 940, h: 1150, r: 28 };
const PHOTO = { x: 130, y: 300, w: 820, h: 820 };

let GAS_URL = PORTAL_FALLBACK_GAS;
let stream_ = null;
let facing_ = 'environment';
let lastBlob_ = null;
let lastSource_ = null;
let criancas_ = [];
let kidIdx_ = 0;

const video = document.getElementById('frame-video');
const resultImg = document.getElementById('frame-result');
const canvas = document.getElementById('frame-canvas');
const ctx = canvas.getContext('2d');

function esc(v) {
  return String(v == null ? '' : v).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}
function digits(v) { return String(v || '').replace(/\D/g, ''); }
function nomeAtual_() { return criancas_[kidIdx_] || ''; }
function igCaption_() {
  const n = nomeAtual_();
  return n
    ? `${n} se divertiu na @movikidsslz 🚗✨ #MoviKids #GoldenShoppingCalhau`
    : 'Diversão na @movikidsslz 🚗✨ #MoviKids #GoldenShoppingCalhau';
}

function setStep(step) {
  document.body.dataset.step = step;
}

function setErr(msg) {
  document.getElementById('frame-err').textContent = msg || '';
}

function updateNomeUI_() {
  const nome = nomeAtual_();
  const nomeEl = document.getElementById('frame-nome');
  if (nomeEl) nomeEl.textContent = nome || '⭐';
  document.getElementById('frame-subtitle').textContent = nome ? 'Foto de ' + nome : 'Sua foto na moldura Movi Kids';
  document.getElementById('frame-caption-hint').textContent = igCaption_();
}

function renderSwitcher_() {
  const el = document.getElementById('frame-switch');
  if (!el) return;
  if (criancas_.length <= 1) {
    el.hidden = true;
    el.innerHTML = '';
    return;
  }
  el.hidden = false;
  el.innerHTML = criancas_.map((n, i) =>
    `<button type="button" class="mk-frame-kid-pill${i === kidIdx_ ? ' is-active' : ''}" data-kid="${i}">${esc(n)}</button>`
  ).join('');
}

function setKidIdx_(i) {
  if (!criancas_.length) return;
  kidIdx_ = Math.max(0, Math.min(criancas_.length - 1, i));
  updateNomeUI_();
  renderSwitcher_();
  if (lastSource_ && document.body.dataset.step === 'done') {
    refreshComposite_();
  }
}

function roundRect_(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

function drawIgGradientBg_(c) {
  const g = c.createLinearGradient(0, 0, OUT_W, OUT_H);
  g.addColorStop(0, '#f09433');
  g.addColorStop(0.25, '#e6683c');
  g.addColorStop(0.5, '#dc2743');
  g.addColorStop(0.75, '#cc2366');
  g.addColorStop(1, '#bc1888');
  c.fillStyle = g;
  c.fillRect(0, 0, OUT_W, OUT_H);
}

function drawHeart_(c, x, y, size, rot, alpha) {
  c.save();
  c.translate(x, y);
  c.rotate(rot);
  c.globalAlpha = alpha || 0.9;
  c.font = size + 'px sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText('❤️', 0, 0);
  c.restore();
  c.globalAlpha = 1;
}

function drawHearts_(c) {
  const hearts = [
    [95, 520, 52, -0.35, 0.85], [1005, 480, 46, 0.4, 0.8],
    [78, 720, 40, 0.2, 0.75], [1010, 760, 44, -0.25, 0.82],
    [140, 980, 36, 0.5, 0.7], [960, 1000, 38, -0.4, 0.72],
    [200, 420, 30, 0.15, 0.65], [900, 620, 34, -0.2, 0.68],
    [60, 880, 28, 0.3, 0.6], [1020, 900, 32, -0.35, 0.65]
  ];
  hearts.forEach(([x, y, sz, rot, a]) => drawHeart_(c, x, y, sz, rot, a));
}

function drawMoldura_(nome) {
  drawIgGradientBg_(ctx);
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = 40;
  ctx.shadowOffsetY = 12;
  ctx.fillStyle = '#fff';
  roundRect_(ctx, CARD.x, CARD.y, CARD.w, CARD.h, CARD.r);
  ctx.fill();
  ctx.restore();

  const hx = CARD.x + 28;
  const hy = CARD.y + 36;
  ctx.fillStyle = 'linear-gradient';
  const ag = ctx.createLinearGradient(hx, hy, hx + 56, hy + 56);
  ag.addColorStop(0, '#5c6bc0');
  ag.addColorStop(1, '#3949ab');
  ctx.fillStyle = ag;
  ctx.beginPath();
  ctx.arc(hx + 28, hy + 28, 28, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#FFD54F';
  ctx.font = 'bold 22px Fredoka One, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('MK', hx + 28, hy + 30);
  ctx.fillStyle = '#262626';
  ctx.font = 'bold 30px Nunito, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('movikidsslz', hx + 68, hy + 30);
  ctx.fillStyle = '#8e8e8e';
  ctx.font = 'bold 36px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('⋯', CARD.x + CARD.w - 28, hy + 30);

  const nomeTxt = String(nome || '').trim() || '⭐';
  ctx.textAlign = 'center';
  const nw = Math.min(560, Math.max(200, ctx.measureText(nomeTxt).width + 80));
  const nx = (OUT_W - nw) / 2;
  const ny = CARD.y + 100;
  const ng = ctx.createLinearGradient(nx, ny, nx + nw, ny);
  ng.addColorStop(0, '#f06292');
  ng.addColorStop(1, '#ec407a');
  ctx.fillStyle = ng;
  roundRect_(ctx, nx, ny, nw, 52, 26);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px Nunito, sans-serif';
  ctx.fillText(nomeTxt.slice(0, 24), OUT_W / 2, ny + 34);

  ctx.fillStyle = '#efefef';
  roundRect_(ctx, PHOTO.x, PHOTO.y, PHOTO.w, PHOTO.h, 12);
  ctx.fill();
  drawHearts_(ctx);

  const ay = PHOTO.y + PHOTO.h + 36;
  ctx.textAlign = 'left';
  ctx.font = 'bold 42px sans-serif';
  ctx.fillStyle = '#262626';
  ctx.fillText('♡', CARD.x + 32, ay);
  ctx.fillText('💬', CARD.x + 88, ay);
  ctx.fillText('↗', CARD.x + 144, ay);
  ctx.textAlign = 'right';
  ctx.fillText('🔖', CARD.x + CARD.w - 32, ay);

  const cy = ay + 52;
  ctx.textAlign = 'left';
  ctx.font = 'bold 26px Nunito, sans-serif';
  ctx.fillStyle = '#262626';
  ctx.fillText('movikidsslz', CARD.x + 32, cy);
  const brandW = ctx.measureText('movikidsslz ').width;
  ctx.font = '24px Nunito, sans-serif';
  ctx.fillStyle = '#262626';
  ctx.fillText('Diversão no Golden Shopping Calhau 🚗✨', CARD.x + 32 + brandW, cy);
  ctx.fillStyle = '#00376b';
  ctx.font = '22px Nunito, sans-serif';
  ctx.fillText('#MoviKids', CARD.x + 32, cy + 36);

  ctx.font = 'bold 56px Fredoka One, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.25)';
  ctx.shadowBlur = 8;
  ctx.fillText('Movi Kids', OUT_W / 2, OUT_H - 48);
  ctx.shadowBlur = 0;
}

function drawPhotoCover_(source) {
  const sw = source.videoWidth || source.naturalWidth || source.width;
  const sh = source.videoHeight || source.naturalHeight || source.height;
  if (!sw || !sh) return;
  const { x, y, w, h } = PHOTO;
  const scale = Math.max(w / sw, h / sh);
  const cw = sw * scale;
  const ch = sh * scale;
  const cx = x + (w - cw) / 2;
  const cy = y + (h - ch) / 2;
  ctx.save();
  roundRect_(ctx, x, y, w, h, 12);
  ctx.clip();
  if (source === video && facing_ === 'user') {
    ctx.translate(x + w, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(source, x + (w - cw) / 2, cy, cw, ch);
  } else {
    ctx.drawImage(source, cx, cy, cw, ch);
  }
  ctx.restore();
}

function drawPhotoBorder_() {
  ctx.strokeStyle = '#dbdbdb';
  ctx.lineWidth = 2;
  ctx.strokeRect(PHOTO.x - 2, PHOTO.y - 2, PHOTO.w + 4, PHOTO.h + 4);
  ctx.strokeStyle = '#ec407a';
  ctx.lineWidth = 6;
  roundRect_(ctx, PHOTO.x - 8, PHOTO.y - 8, PHOTO.w + 16, PHOTO.h + 16, 20);
  ctx.stroke();
}

async function composite_(source) {
  drawMoldura_(nomeAtual_());
  drawPhotoCover_(source);
  drawPhotoBorder_();
  return new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
}

async function refreshComposite_() {
  if (!lastSource_) return;
  try {
    lastBlob_ = await composite_(lastSource_);
    resultImg.src = URL.createObjectURL(lastBlob_);
  } catch (e) {}
}

function stopCamera_() {
  if (stream_) {
    stream_.getTracks().forEach(t => t.stop());
    stream_ = null;
  }
  video.srcObject = null;
}

async function startCamera_() {
  setErr('');
  stopCamera_();
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setErr('Use o celular ou escolha da galeria.');
    return;
  }
  try {
    stream_ = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing_, width: { ideal: 1280 }, height: { ideal: 1280 } },
      audio: false
    });
    video.srcObject = stream_;
    video.dataset.facing = facing_;
    await video.play();
    setStep('live');
  } catch (e) {
    setErr('Permita a câmera ou escolha da galeria.');
  }
}

async function useFile_(file) {
  if (!file) return;
  setErr('');
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = async () => {
    try {
      lastSource_ = img;
      lastBlob_ = await composite_(img);
      resultImg.src = URL.createObjectURL(lastBlob_);
      setStep('done');
    } catch (e) {
      setErr('Erro ao montar a foto.');
    }
    URL.revokeObjectURL(url);
  };
  img.onerror = () => setErr('Imagem inválida.');
  img.src = url;
}

async function snap_() {
  if (!video.videoWidth) return;
  try {
    lastSource_ = video;
    lastBlob_ = await composite_(video);
    resultImg.src = URL.createObjectURL(lastBlob_);
    stopCamera_();
    setStep('done');
  } catch (e) {
    setErr('Erro ao capturar.');
  }
}

function download_() {
  if (!lastBlob_) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(lastBlob_);
  a.download = 'movikids-foto.jpg';
  a.click();
}

async function share_() {
  if (!lastBlob_) return;
  setErr('');
  const cap = igCaption_();
  const file = new File([lastBlob_], 'movikids-foto.jpg', { type: 'image/jpeg' });
  try { await navigator.clipboard.writeText(cap); } catch (e) {}
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'Movi Kids', text: cap });
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }
  download_();
  setErr('Foto salva. Abra o Instagram e marque @movikidsslz');
  setTimeout(() => window.open(IG_PROFILE, '_blank', 'noopener'), 500);
}

function retry_() {
  lastBlob_ = null;
  lastSource_ = null;
  resultImg.removeAttribute('src');
  setStep('start');
  setErr('');
}

async function loadGasUrl_() {
  try {
    const base = location.pathname.replace(/[^/]*$/, '');
    const r = await fetch(base + 'gas-endpoint.json?_=' + Date.now(), { cache: 'no-store' });
    const j = await r.json();
    if (j && j.url) GAS_URL = j.url;
  } catch (e) {}
}

async function loadCriancas_(tel) {
  if (!tel || tel.length < 10) return;
  try {
    const url = GAS_URL + '?action=buscarPortalResponsavel&telefone=' + encodeURIComponent(tel) + '&t=' + Date.now();
    const r = await fetch(url, { cache: 'no-store' });
    const d = await r.json();
    if (!d.ok || !d.locacoes || !d.locacoes.length) return;
    const seen = new Set();
    criancas_ = [];
    d.locacoes.forEach(l => {
      const n = String(l.crianca || '').trim();
      if (n && !seen.has(n.toLowerCase())) {
        seen.add(n.toLowerCase());
        criancas_.push(n);
      }
    });
  } catch (e) {}
}

document.getElementById('btn-camera').addEventListener('click', startCamera_);
document.getElementById('btn-flip').addEventListener('click', () => {
  facing_ = facing_ === 'environment' ? 'user' : 'environment';
  startCamera_();
});
document.getElementById('btn-snap').addEventListener('click', snap_);
document.getElementById('file-pick').addEventListener('change', e => useFile_(e.target.files[0]));
document.getElementById('btn-share').addEventListener('click', share_);
document.getElementById('btn-download').addEventListener('click', download_);
document.getElementById('btn-retry').addEventListener('click', retry_);

document.getElementById('frame-switch').addEventListener('click', e => {
  const btn = e.target.closest('[data-kid]');
  if (btn) setKidIdx_(Number(btn.getAttribute('data-kid')));
});

(async function init_() {
  const p = new URLSearchParams(location.search);
  const tel = digits(p.get('tel') || p.get('telefone') || '');
  const nomeUrl = (p.get('nome') || '').trim();

  if (tel) {
    document.getElementById('link-voltar').href = 'acompanhar.html?tel=' + encodeURIComponent(tel);
  }

  await loadGasUrl_();
  if (tel) await loadCriancas_(tel);

  if (!criancas_.length && nomeUrl) criancas_ = [nomeUrl];

  if (nomeUrl && criancas_.length) {
    const ni = criancas_.findIndex(n => n.toLowerCase() === nomeUrl.toLowerCase());
    kidIdx_ = ni >= 0 ? ni : 0;
  }

  updateNomeUI_();
  renderSwitcher_();
})();
</script>
</body>
</html>
